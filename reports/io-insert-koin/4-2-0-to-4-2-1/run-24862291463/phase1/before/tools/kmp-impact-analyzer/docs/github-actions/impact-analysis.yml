name: Dependency Impact Analysis

on:
  pull_request:
    paths:
      - "**/libs.versions.toml"
      - ".github/workflows/impact-analysis.yml"
      - "tools/kmp-impact-analyzer/**"
  workflow_dispatch:
    inputs:
      dependency:
        description: "Dependency group (e.g. io.ktor)"
        required: true
      before_version:
        description: "Version before"
        required: true
      after_version:
        description: "Version after"
        required: true

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  detect-pr-change:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      dependency_group: ${{ steps.detect.outputs.dependency_group }}
      before_version: ${{ steps.detect.outputs.before_version }}
      after_version: ${{ steps.detect.outputs.after_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ./tools/kmp-impact-analyzer
      - name: Export catalogs
        run: |
          set -euo pipefail
          mapfile -t cats < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- '**/libs.versions.toml')
          [ "${#cats[@]}" -eq 0 ] && { echo "catalog_path=" >> "$GITHUB_OUTPUT"; exit 0; }
          echo "catalog_path=${cats[0]}" >> "$GITHUB_OUTPUT"
          mkdir -p .tmp
          git show "${{ github.event.pull_request.base.sha }}:${cats[0]}" > .tmp/base.toml
          git show "${{ github.event.pull_request.head.sha }}:${cats[0]}" > .tmp/head.toml
        id: catalog
      - name: Detect changes
        id: detect
        if: steps.catalog.outputs.catalog_path != ''
        run: kmp-impact detect-version-changes --before .tmp/base.toml --after .tmp/head.toml --format github >> "$GITHUB_OUTPUT"

  analyze:
    needs: detect-pr-change
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.detect-pr-change.outputs.has_changes == 'true')
      )
    runs-on: ubuntu-latest
    outputs:
      report_path: ${{ steps.pages-meta.outputs.report_path }}
    env:
      DEP_GROUP: ${{ github.event_name == 'pull_request' && needs.detect-pr-change.outputs.dependency_group || github.event.inputs.dependency }}
      BEFORE_VER: ${{ github.event_name == 'pull_request' && needs.detect-pr-change.outputs.before_version || github.event.inputs.before_version }}
      AFTER_VER: ${{ github.event_name == 'pull_request' && needs.detect-pr-change.outputs.after_version || github.event.inputs.after_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/kmp-impact-analyzer/pyproject.toml

      - name: Install analyzer and DroidBot
        run: |
          pip install ./tools/kmp-impact-analyzer[dev]
          # Install DroidBot from GitHub (PyPI version is Python 2 only)
          # DroidBot from GitHub (Python 3), pin androguard 3.4.0a1 (has bytecodes API)
          pip install "androguard==3.4.0a1" "droidbot @ git+https://github.com/honeynet/droidbot.git"
          # Fix entry point
          sed -i 's/from start import/from droidbot.start import/' "$(which droidbot)"
          # Patch app.py: androguard 3.x crashes on modern APK resources.
          # Wrap resource-dependent calls in try/except so DroidBot can still explore.
          PKG=$(python3 -c "import importlib.util; print(importlib.util.find_spec('droidbot').submodule_search_locations[0])")
          python3 << PATCH
          from pathlib import Path
          app_py = Path("$PKG/app.py")
          src = app_py.read_text()
          old = '''        self.apk = APK(self.app_path)
          self.package_name = self.apk.get_package()
          self.app_name = self.apk.get_app_name()
          self.main_activity = self.apk.get_main_activity()
          self.permissions = self.apk.get_permissions()
          self.activities = self.apk.get_activities()
          self.possible_broadcasts = self.get_possible_broadcasts()'''
          new = '''        self.apk = APK(self.app_path)
          self.package_name = self.apk.get_package()
          try:
              self.app_name = self.apk.get_app_name()
          except Exception:
              self.app_name = self.package_name or "unknown"
          try:
              self.main_activity = self.apk.get_main_activity()
          except Exception:
              self.main_activity = None
          try:
              self.permissions = self.apk.get_permissions()
          except Exception:
              self.permissions = []
          try:
              self.activities = self.apk.get_activities()
          except Exception:
              self.activities = []
          self.possible_broadcasts = self.get_possible_broadcasts()'''
          if old in src:
              app_py.write_text(src.replace(old, new))
              print("Patched app.py: resource parsing wrapped in try/except")
          else:
              print("WARNING: app.py patch target not found, trying line-by-line")
              lines = src.split('\n')
              patched = []
              for line in lines:
                  for method in ['get_app_name', 'get_main_activity', 'get_permissions', 'get_activities']:
                      if f'self.apk.{method}()' in line and 'try' not in line:
                          indent = line[:len(line) - len(line.lstrip())]
                          attr = line.split('=')[0].strip()
                          patched.append(f'{indent}try:')
                          patched.append(f'{indent}    {line.strip()}')
                          patched.append(f'{indent}except Exception:')
                          default = '[]' if 'activities' in attr or 'permissions' in attr else 'self.package_name or "unknown"' if 'name' in attr else 'None'
                          patched.append(f'{indent}    {attr} = {default}')
                          break
                  else:
                      patched.append(line)
              app_py.write_text('\n'.join(patched))
              print("Patched app.py: line-by-line fallback")
          PATCH
          droidbot --help | head -3

      - name: Run tests
        run: pytest -q tools/kmp-impact-analyzer/tests
        env:
          PYTHONPATH: tools/kmp-impact-analyzer/src

      # ── Detect Android app module ──
      - name: Detect Android app module
        id: detect-app
        run: |
          chmod +x gradlew
          # Try common module names
          for mod in app composeApp androidApp android-app; do
            if [ -d "$mod" ]; then
              echo "app_module=:${mod}" >> "$GITHUB_OUTPUT"
              echo "app_dir=${mod}" >> "$GITHUB_OUTPUT"
              echo "Detected Android module: :${mod}"
              exit 0
            fi
          done
          echo "No Android app module found"
          echo "app_module=" >> "$GITHUB_OUTPUT"

      # ── Build APKs (before + after) ──
      - name: Build BEFORE APK
        if: steps.detect-app.outputs.app_module != ''
        continue-on-error: true
        env:
          APP_MOD: ${{ steps.detect-app.outputs.app_module }}
        run: |
          git show "${{ github.event.pull_request.base.sha || 'HEAD' }}:gradle/libs.versions.toml" > gradle/libs.versions.toml 2>/dev/null || true
          ./gradlew "${APP_MOD}:assembleDebug" --no-daemon 2>&1 | tail -20
          APK=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          if [ -n "$APK" ]; then cp "$APK" /tmp/before.apk && echo "BEFORE APK: $APK"; fi
          git checkout -- gradle/libs.versions.toml

      - name: Build AFTER APK
        if: steps.detect-app.outputs.app_module != ''
        continue-on-error: true
        env:
          APP_MOD: ${{ steps.detect-app.outputs.app_module }}
        run: |
          ./gradlew clean "${APP_MOD}:assembleDebug" --no-daemon 2>&1 | tail -20
          APK=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          if [ -n "$APK" ]; then cp "$APK" /tmp/after.apk && echo "AFTER APK: $APK"; fi

      # ── DroidBot: always run on BEFORE, optionally on AFTER ──
      - name: Enable KVM
        if: always()
        continue-on-error: true
        run: |
          if [ ! -f /tmp/before.apk ]; then
            echo "No BEFORE APK, skipping emulator"
            exit 0
          fi
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write DroidBot script
        if: always()
        run: |
          cat > /tmp/run-droidbot.sh << 'DBSCRIPT'
          #!/usr/bin/env bash
          set -x
          if [ ! -f /tmp/before.apk ]; then
            echo "No BEFORE APK, skip DroidBot entirely"
            exit 0
          fi
          echo "=== DroidBot on BEFORE APK ==="
          droidbot -a /tmp/before.apk -o /tmp/droidbot-before -policy dfs_greedy -count 150 -timeout 120 -grant_perm -keep_env -is_emulator || true
          if [ -f /tmp/after.apk ]; then
            echo "=== DroidBot on AFTER APK ==="
            droidbot -a /tmp/after.apk -o /tmp/droidbot-after -policy dfs_greedy -count 150 -timeout 120 -grant_perm -keep_env -is_emulator || true
          else
            echo "=== AFTER APK failed to build — using BEFORE as baseline ==="
            cp -R /tmp/droidbot-before /tmp/droidbot-after
          fi
          echo "=== DroidBot done ==="
          DBSCRIPT
          chmod +x /tmp/run-droidbot.sh

      - name: Run DroidBot on emulator
        if: always()
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: /tmp/run-droidbot.sh

      # ── CodeCharta viewer (cached) ──
      - name: Cache CodeCharta viewer
        id: cc-cache
        uses: actions/cache@v4
        with:
          path: /tmp/codecharta-viewer
          key: codecharta-vis-1.142.0

      - name: Download CodeCharta viewer
        if: steps.cc-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          gh release download vis-1.142.0 --repo MaibornWolff/codecharta --pattern 'web.zip' --dir /tmp/ --clobber
          unzip -q /tmp/web.zip -d /tmp/cc-extract/
          # web.zip extracts to dist/bundler/browser/ — flatten to /tmp/codecharta-viewer/
          mv /tmp/cc-extract/dist/bundler/browser /tmp/codecharta-viewer
          echo "CodeCharta viewer ready: $(ls /tmp/codecharta-viewer/index.html)"
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Run pipeline (always use DroidBot output if BEFORE ran) ──
      - name: Run impact analysis
        run: |
          set -euo pipefail
          DYNAMIC_ARGS=""
          if [ -d /tmp/droidbot-before ]; then
            DYNAMIC_ARGS="--droidbot-before-output /tmp/droidbot-before --droidbot-after-output /tmp/droidbot-after"
            echo "Using DroidBot output (before exists, after=$([ -f /tmp/after.apk ] && echo 'real' || echo 'copy-of-before'))"
          else
            DYNAMIC_ARGS="--skip-dynamic"
            echo "⚠ No DroidBot output — running static-only analysis"
          fi
          kmp-impact analyze \
            --repo . \
            --dependency "$DEP_GROUP" \
            --before-version "$BEFORE_VER" \
            --after-version "$AFTER_VER" \
            --output-dir /tmp/output \
            $DYNAMIC_ARGS

      # ── Inject CodeCharta viewer + DroidBot UTG into output ──
      - name: Hydrate viewer assets
        run: |
          set -euo pipefail
          if [ -d /tmp/codecharta-viewer ]; then
            mkdir -p /tmp/output/phase5
            cp -R /tmp/codecharta-viewer /tmp/output/phase5/codecharta-viewer
          fi
          if [ -d /tmp/droidbot-before ]; then
            mkdir -p /tmp/output/phase3/impact-utg /tmp/output/phase3/before-utg /tmp/output/phase3/after-utg
            cp -R /tmp/droidbot-before/. /tmp/output/phase3/before-utg/
            cp -R /tmp/droidbot-after/. /tmp/output/phase3/after-utg/
            cp -R /tmp/droidbot-after/. /tmp/output/phase3/impact-utg/
            echo "UTG files hydrated:"
            ls /tmp/output/phase3/impact-utg/index.html 2>/dev/null && echo "  impact-utg/index.html OK" || echo "  impact-utg/index.html MISSING"
            ls /tmp/output/phase3/impact-utg/utg.js 2>/dev/null && echo "  impact-utg/utg.js OK" || echo "  impact-utg/utg.js MISSING"
          fi

      # ── Regenerate report with hydrated assets ──
      - name: Rebuild report with viewer assets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from kmp_impact_analyzer.contracts import ConsolidatedResult, ShadowManifest
          from kmp_impact_analyzer.reporting.report_site import generate_report_site
          output = Path("/tmp/output")
          consolidated = ConsolidatedResult.model_validate_json(
              (output / "phase4" / "consolidated.json").read_text()
          )
          manifest = ShadowManifest.model_validate_json(
              (output / "phase1" / "manifest.json").read_text()
          )
          generate_report_site(consolidated, manifest, output)
          PY

      - name: Compute report path
        id: pages-meta
        run: |
          python3 - <<'PY'
          import json, os, re
          from pathlib import Path
          s = json.loads(Path("/tmp/output/report/summary.json").read_text())
          slug = lambda v: re.sub(r"[^a-zA-Z0-9]+", "-", v.strip().lower()).strip("-") or "unknown"
          rp = f"reports/{slug(s.get('dependency_group','unknown'))}/{slug(s.get('version_before','b'))}-to-{slug(s.get('version_after','a'))}/run-{os.environ['GITHUB_RUN_ID']}"
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"report_path={rp}\n")
          PY

      - name: Build site bundle
        run: |
          set -euo pipefail
          RP="${{ steps.pages-meta.outputs.report_path }}"
          mkdir -p "site/$RP"
          cp -R /tmp/output/report/. "site/$RP/"
          for p in phase1 phase2 phase3 phase4 phase5; do
            [ -d "/tmp/output/$p" ] && cp -R "/tmp/output/$p" "site/$RP/"
          done

      - run: cat /tmp/output/report/summary.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: impact-analysis-results
          path: /tmp/output/

      - uses: actions/upload-artifact@v4
        with:
          name: impact-report-site
          path: site/
          retention-days: 30

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ steps.pages-meta.outputs.report_path }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          script: |
            const base = `https://${process.env.REPO_OWNER}.github.io/${process.env.REPO_NAME}`;
            const reportUrl = `${base}/${process.env.REPORT_PATH}/`;
            const fs = require('fs');
            const s = JSON.parse(fs.readFileSync('/tmp/output/report/summary.json', 'utf8'));
            const body = [
              `Bumps \`${s.dependency_group}\` from \`${s.version_before}\` to \`${s.version_after}\`.`,
              '', '### Dependabot impact companion', '',
              `- Risk: **${(s.risk_level || 'low').toUpperCase()}**`,
              `- Impacted files: ${s.total_impacted_files ?? 0}`,
              `- Impacted screens: ${s.total_impacted_screens ?? 0}`,
              `- Dynamic analysis: ${s.dynamic_summary}`,
              `- Recommendation: ${s.recommendation}`,
              `- Full report: ${reportUrl}`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

  deploy-pages:
    needs: analyze
    if: always() && needs.analyze.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: impact-pages-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: impact-report-site
          path: new-report/

      - uses: actions/checkout@v4
        with:
          ref: gh-pages-history
          path: pages-payload
          fetch-depth: 1
        continue-on-error: true

      - run: "[ -d pages-payload ] || mkdir -p pages-payload"

      - name: Merge into cumulative site
        env:
          REPORT_PATH: ${{ needs.analyze.outputs.report_path }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "pages-payload/$REPORT_PATH")"
          cp -R new-report/"$REPORT_PATH" pages-payload/"$REPORT_PATH"
          python3 - <<'PY'
          import html, json, os
          from pathlib import Path
          root = Path('pages-payload')
          rn, ro = os.environ['REPO_NAME'], os.environ['REPO_OWNER']
          bp = f"/{rn}" if rn != f"{ro}.github.io" else ""
          crp = os.environ['REPORT_PATH']; lh = f"{bp}/{crp}/"
          reports = []
          for f in sorted(root.glob('reports/*/*/run-*/index.html'), reverse=True):
              rp = str(f.parent.relative_to(root)); sp = f.parent / 'summary.json'
              d = b = a = r = 'unknown'
              if sp.exists():
                  s = json.loads(sp.read_text())
                  d, b, a, r = s.get('dependency_group',d), s.get('version_before',b), s.get('version_after',a), s.get('risk_level',r)
              reports.append(dict(p=rp,d=d,b=b,a=a,r=r))
          e = lambda v: html.escape(str(v), quote=True)
          rows = '\n'.join(f'<tr><td><a href="{e(bp+"/"+i["p"]+"/")}">{e(i["p"].split("/")[-1])}</a></td><td>{e(i["d"])}</td><td>{e(i["b"])}</td><td>{e(i["a"])}</td><td>{e(i["r"])}</td></tr>' for i in reports) or '<tr><td colspan="5">No reports.</td></tr>'
          (root/'index.html').write_text(f'<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>Impact Reports</title><style>body{{font-family:system-ui;margin:2rem auto;max-width:1000px;padding:0 1rem}}table{{border-collapse:collapse;width:100%;margin:1.5rem 0}}th,td{{border:1px solid #e5e7eb;padding:.65rem;text-align:left}}th{{background:#f9fafb}}.c{{background:#f9fafb;border:1px solid #e5e7eb;border-radius:.5rem;padding:1rem;margin:1rem 0}}</style></head><body><h1>Dependency Impact Analysis Reports</h1><div class="c"><strong>Latest:</strong> <a href="{e(lh)}">{e(crp)}</a></div><table><thead><tr><th>Run</th><th>Dependency</th><th>Before</th><th>After</th><th>Risk</th></tr></thead><tbody>{rows}</tbody></table></body></html>')
          ld = root/'reports'/'latest'; ld.mkdir(parents=True, exist_ok=True)
          (ld/'index.html').write_text(f'<!doctype html><html><head><meta http-equiv="refresh" content="0;url={e(lh)}"/></head><body><a href="{e(lh)}">Latest</a></body></html>')
          PY

      - name: Persist history
        run: |
          cd pages-payload && rm -rf .git && git init && git checkout -b gh-pages-history
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add . && git commit -m "Publish ${{ needs.analyze.outputs.report_path }}"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages-history

      - uses: actions/upload-pages-artifact@v4
        with:
          path: pages-payload/

      - uses: actions/deploy-pages@v4
